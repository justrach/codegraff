<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Graff GPT 5.5 WebSocket Flow</title>
  <desc id="desc">A diagram showing how Graff sends context to GPT 5.5 through the OpenAI Responses API, streams over WebSocket, executes tools, and reuses continuation state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17191d"/>
      <stop offset="0.56" stop-color="#22252b"/>
      <stop offset="1" stop-color="#15171a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#2bd4c5"/>
      <stop offset="1" stop-color="#7ef0d6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1">
      <stop offset="0" stop-color="#f4b04e"/>
      <stop offset="1" stop-color="#ffd37a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#54e1ce"/>
    </marker>
    <marker id="arrow-amber" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#f6c05f"/>
    </marker>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 42px; font-weight: 760; fill: #f8fbfa; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 20px; fill: #b7c6c3; }
      .label { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 22px; font-weight: 720; fill: #f8fbfa; }
      .small { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 16px; fill: #cfd8d6; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #9facaa; }
      .box { fill: #242830; stroke: #3c434c; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .box2 { fill: #20242b; stroke: #526063; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .core { fill: #252025; stroke: #dca64f; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .line-teal { fill: none; stroke: #54e1ce; stroke-width: 4; marker-end: url(#arrow-teal); }
      .line-amber { fill: none; stroke: #f6c05f; stroke-width: 4; marker-end: url(#arrow-amber); }
      .line-muted { fill: none; stroke: #697178; stroke-width: 2.5; stroke-dasharray: 8 8; }
      .pill { fill: #142e31; stroke: #3ed9ca; stroke-width: 1.2; rx: 8; }
      .pill2 { fill: #352918; stroke: #e3a64d; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1140" cy="130" r="260" fill="#2bd4c5" opacity="0.06"/>
  <circle cx="300" cy="760" r="300" fill="#f4b04e" opacity="0.05"/>

  <text x="72" y="86" class="title">Graff with GPT 5.5 over WebSocket</text>
  <text x="74" y="124" class="subtitle">A single turn becomes structured input, streamed events, tool execution, and reusable continuation state.</text>

  <rect x="76" y="214" width="250" height="136" class="box"/>
  <text x="104" y="259" class="label">CLI or TUI</text>
  <text x="104" y="295" class="small">prompt, files, tools</text>
  <text x="104" y="322" class="tiny">conversation id anchors the turn</text>

  <rect x="430" y="196" width="280" height="172" class="box2"/>
  <text x="462" y="242" class="label">Context Builder</text>
  <text x="462" y="278" class="small">messages + images</text>
  <text x="462" y="304" class="small">tool definitions</text>
  <text x="462" y="330" class="small">reasoning settings</text>

  <rect x="812" y="160" width="300" height="236" class="core"/>
  <text x="848" y="210" class="label">Responses Request</text>
  <text x="848" y="246" class="small">model: GPT 5.5</text>
  <text x="848" y="274" class="small">stream: true</text>
  <text x="848" y="302" class="small">prompt cache key</text>
  <text x="848" y="330" class="small">strict tool schemas</text>
  <rect x="848" y="350" width="190" height="30" class="pill2"/>
  <text x="866" y="371" class="tiny">response.create event</text>

  <rect x="1162" y="228" width="210" height="116" class="box"/>
  <text x="1192" y="276" class="label">OpenAI</text>
  <text x="1192" y="306" class="small">Responses API</text>
  <text x="1192" y="330" class="tiny">WebSocket endpoint</text>

  <rect x="842" y="536" width="300" height="148" class="box2"/>
  <text x="876" y="584" class="label">Stream Decoder</text>
  <text x="876" y="620" class="small">text deltas</text>
  <text x="876" y="646" class="small">reasoning summaries</text>
  <text x="876" y="672" class="small">tool argument deltas</text>

  <rect x="430" y="526" width="282" height="170" class="box"/>
  <text x="462" y="574" class="label">Tool Runner</text>
  <text x="462" y="610" class="small">execute allowed calls</text>
  <text x="462" y="636" class="small">return structured output</text>
  <rect x="462" y="656" width="178" height="30" class="pill"/>
  <text x="482" y="677" class="tiny">function output item</text>

  <rect x="76" y="514" width="250" height="196" class="box2"/>
  <text x="104" y="562" class="label">Session State</text>
  <text x="104" y="598" class="small">previous response id</text>
  <text x="104" y="624" class="small">input prefix signature</text>
  <text x="104" y="650" class="small">warm socket reuse</text>
  <text x="104" y="676" class="tiny">falls back to HTTP/SSE on errors</text>

  <path d="M326 282 C360 282, 388 282, 430 282" class="line-teal"/>
  <path d="M710 282 C744 282, 770 282, 812 282" class="line-teal"/>
  <path d="M1112 282 C1132 282, 1142 282, 1162 282" class="line-amber"/>
  <path d="M1267 344 C1267 468, 1130 500, 1040 536" class="line-teal"/>
  <path d="M842 616 C780 616, 748 616, 712 616" class="line-amber"/>
  <path d="M430 616 C386 616, 360 616, 326 616" class="line-teal"/>
  <path d="M201 514 C210 438, 270 374, 430 330" class="line-muted"/>
  <path d="M201 514 C438 470, 676 430, 848 380" class="line-muted"/>

  <text x="352" y="260" class="tiny">domain context</text>
  <text x="738" y="260" class="tiny">API payload</text>
  <text x="1152" y="260" class="tiny">upgrade</text>
  <text x="1160" y="462" class="tiny">events</text>
  <text x="738" y="596" class="tiny">tool call</text>
  <text x="330" y="596" class="tiny">result</text>
  <text x="348" y="428" class="tiny">next turn sends only new items</text>

  <rect x="76" y="772" width="1296" height="58" fill="#1d2026" stroke="#343a42" stroke-width="1.2" rx="8"/>
  <text x="106" y="807" class="small">Key behavior: warm socket reuse is optimistic; one WebSocket failure flips the session to HTTP/SSE so the user gets a reply instead of a hung turn.</text>
</svg>
