<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Graff Harness Flow</title>
  <desc id="desc">A diagram showing how the Graff evaluation harness reads task definitions, expands data sources, runs commands in parallel, validates output, and writes logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#181a1f"/>
      <stop offset="0.55" stop-color="#222421"/>
      <stop offset="1" stop-color="#16191d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#66dcca"/>
    </marker>
    <marker id="arrow2" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#f1bd61"/>
    </marker>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 42px; font-weight: 760; fill: #fbfffd; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 20px; fill: #bdc7c3; }
      .label { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 21px; font-weight: 730; fill: #fbfffd; }
      .small { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 16px; fill: #d3ddd8; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #a8b2af; }
      .box { fill: #24282f; stroke: #3d464d; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .data { fill: #172d2d; stroke: #50dcca; stroke-width: 1.7; rx: 8; filter: url(#shadow); }
      .run { fill: #302719; stroke: #f1bd61; stroke-width: 1.7; rx: 8; filter: url(#shadow); }
      .line { fill: none; stroke: #66dcca; stroke-width: 4; marker-end: url(#arrow); }
      .line2 { fill: none; stroke: #f1bd61; stroke-width: 4; marker-end: url(#arrow2); }
      .dash { fill: none; stroke: #6a7473; stroke-width: 2.4; stroke-dasharray: 8 9; }
      .slot { fill: #1b2026; stroke: #465158; stroke-width: 1.1; rx: 6; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1180" cy="155" r="260" fill="#66dcca" opacity="0.05"/>
  <circle cx="250" cy="800" r="270" fill="#f1bd61" opacity="0.055"/>

  <text x="72" y="86" class="title">Graff Harness: Data-Driven Agent Evals</text>
  <text x="74" y="124" class="subtitle">Task files expand into isolated command runs with live validations, logs, and a summary.</text>

  <rect x="72" y="218" width="236" height="176" class="box"/>
  <text x="106" y="264" class="label">task.yml</text>
  <text x="106" y="300" class="small">setup commands</text>
  <text x="106" y="326" class="small">run template</text>
  <text x="106" y="352" class="small">parallelism</text>
  <text x="106" y="378" class="small">timeout + checks</text>

  <rect x="392" y="218" width="236" height="176" class="data"/>
  <text x="426" y="264" class="label">Sources</text>
  <text x="426" y="300" class="small">CSV rows</text>
  <text x="426" y="326" class="small">inline values</text>
  <text x="426" y="352" class="small">cross product</text>
  <text x="426" y="378" class="tiny">one context per task</text>

  <rect x="712" y="218" width="236" height="176" class="box"/>
  <text x="746" y="264" class="label">Command Render</text>
  <text x="746" y="300" class="small">Handlebars template</text>
  <text x="746" y="326" class="small">row variables</text>
  <text x="746" y="352" class="small">escaped patterns</text>

  <rect x="1032" y="190" width="300" height="232" class="run"/>
  <text x="1068" y="238" class="label">Parallel Workers</text>
  <rect x="1068" y="272" width="226" height="34" class="slot"/>
  <text x="1088" y="294" class="tiny">temp workspace 1</text>
  <rect x="1068" y="318" width="226" height="34" class="slot"/>
  <text x="1088" y="340" class="tiny">temp workspace 2</text>
  <rect x="1068" y="364" width="226" height="34" class="slot"/>
  <text x="1088" y="386" class="tiny">temp workspace n</text>

  <rect x="392" y="554" width="236" height="176" class="run"/>
  <text x="426" y="600" class="label">Live Execution</text>
  <text x="426" y="636" class="small">spawn shell command</text>
  <text x="426" y="662" class="small">capture stdout/stderr</text>
  <text x="426" y="688" class="small">strip ANSI in logs</text>

  <rect x="712" y="554" width="236" height="176" class="data"/>
  <text x="746" y="600" class="label">Validation</text>
  <text x="746" y="636" class="small">regex checks</text>
  <text x="746" y="662" class="small">shell checks</text>
  <text x="746" y="688" class="small">early exit support</text>

  <rect x="1032" y="554" width="300" height="176" class="box"/>
  <text x="1068" y="600" class="label">Artifacts</text>
  <text x="1068" y="636" class="small">per-task debug logs</text>
  <text x="1068" y="662" class="small">status per row</text>
  <text x="1068" y="688" class="small">aggregate summary</text>

  <path d="M308 306 C342 306, 360 306, 392 306" class="line"/>
  <path d="M628 306 C662 306, 680 306, 712 306" class="line"/>
  <path d="M948 306 C982 306, 1000 306, 1032 306" class="line2"/>
  <path d="M1182 422 C1070 480, 805 508, 628 614" class="dash"/>
  <path d="M628 642 C662 642, 680 642, 712 642" class="line2"/>
  <path d="M948 642 C982 642, 1000 642, 1032 642" class="line"/>

  <text x="330" y="284" class="tiny">load</text>
  <text x="650" y="284" class="tiny">interpolate</text>
  <text x="970" y="284" class="tiny">schedule</text>
  <text x="670" y="506" class="tiny">stream output into checks and logs</text>
  <text x="650" y="620" class="tiny">check</text>
  <text x="970" y="620" class="tiny">record</text>

  <rect x="72" y="786" width="1260" height="58" fill="#1d2226" stroke="#394245" stroke-width="1.2" rx="8"/>
  <text x="106" y="821" class="small">Current implementation note: regex and shell validations execute today; the schema also names LLM validation, but that path is not wired in the checked runner.</text>
</svg>
