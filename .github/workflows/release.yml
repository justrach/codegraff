name: Multi Channel Release
'on':
  release:
    types:
    - published
permissions:
  contents: write
  pull-requests: write
jobs:
  build_release:
    name: build-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-linux-x86_64
          codegraff_binary_name: codegraff-x86_64-unknown-linux-musl
          codegraff_binary_path: target/x86_64-unknown-linux-musl/release/codegraff
          cross: 'true'
          forge_binary_name: forge-x86_64-unknown-linux-musl
          forge_binary_path: target/x86_64-unknown-linux-musl/release/forge
          os: ubuntu-latest
          target: x86_64-unknown-linux-musl
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-linux-arm64
          codegraff_binary_name: codegraff-aarch64-unknown-linux-musl
          codegraff_binary_path: target/aarch64-unknown-linux-musl/release/codegraff
          cross: 'true'
          forge_binary_name: forge-aarch64-unknown-linux-musl
          forge_binary_path: target/aarch64-unknown-linux-musl/release/forge
          os: ubuntu-latest
          target: aarch64-unknown-linux-musl
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-linux-x86_64
          codegraff_binary_name: codegraff-x86_64-unknown-linux-gnu
          codegraff_binary_path: target/x86_64-unknown-linux-gnu/release/codegraff
          cross: 'false'
          forge_binary_name: forge-x86_64-unknown-linux-gnu
          forge_binary_path: target/x86_64-unknown-linux-gnu/release/forge
          os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-linux-arm64
          codegraff_binary_name: codegraff-aarch64-unknown-linux-gnu
          codegraff_binary_path: target/aarch64-unknown-linux-gnu/release/codegraff
          cross: 'true'
          forge_binary_name: forge-aarch64-unknown-linux-gnu
          forge_binary_path: target/aarch64-unknown-linux-gnu/release/forge
          os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-darwin-x86_64
          codegraff_binary_name: codegraff-x86_64-apple-darwin
          codegraff_binary_path: target/x86_64-apple-darwin/release/codegraff
          cross: 'false'
          forge_binary_name: forge-x86_64-apple-darwin
          forge_binary_path: target/x86_64-apple-darwin/release/forge
          os: macos-latest
          target: x86_64-apple-darwin
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: codedb-darwin-arm64
          codegraff_binary_name: codegraff-aarch64-apple-darwin
          codegraff_binary_path: target/aarch64-apple-darwin/release/codegraff
          cross: 'false'
          forge_binary_name: forge-aarch64-apple-darwin
          forge_binary_path: target/aarch64-apple-darwin/release/forge
          os: macos-latest
          target: aarch64-apple-darwin
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: ''
          codegraff_binary_name: codegraff-x86_64-pc-windows-msvc.exe
          codegraff_binary_path: target/x86_64-pc-windows-msvc/release/codegraff.exe
          cross: 'false'
          forge_binary_name: forge-x86_64-pc-windows-msvc.exe
          forge_binary_path: target/x86_64-pc-windows-msvc/release/forge.exe
          os: windows-latest
          target: x86_64-pc-windows-msvc
        - build_bins: '--bin forge --bin codegraff'
          codedb_asset: ''
          codegraff_binary_name: codegraff-aarch64-pc-windows-msvc.exe
          codegraff_binary_path: target/aarch64-pc-windows-msvc/release/codegraff.exe
          cross: 'false'
          forge_binary_name: forge-aarch64-pc-windows-msvc.exe
          forge_binary_path: target/aarch64-pc-windows-msvc/release/forge.exe
          os: windows-latest
          target: aarch64-pc-windows-msvc
        - build_bins: '--bin forge'
          codedb_asset: ''
          codegraff_binary_name: ''
          codegraff_binary_path: ''
          cross: 'true'
          forge_binary_name: forge-aarch64-linux-android
          forge_binary_path: target/aarch64-linux-android/release/forge
          os: ubuntu-latest
          target: aarch64-linux-android
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      if: ${{ matrix.cross == 'false' }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cross Toolchain
      if: ${{ matrix.cross == 'false' }}
      uses: taiki-e/setup-cross-toolchain-action@v1
      with:
        target: ${{ matrix.target }}
    - name: Add Rust target
      if: ${{ matrix.cross == 'false' }}
      run: rustup target add ${{ matrix.target }}
    - name: Set Rust Flags
      if: '!(contains(matrix.target, ''-unknown-linux-'') || contains(matrix.target, ''-android''))'
      run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
    - name: Build Binaries
      uses: ClementTsang/cargo-action@v0.0.7
      with:
        command: build --release
        args: ${{ matrix.build_bins }} --target ${{ matrix.target }}
        use-cross: ${{ matrix.cross }}
        cross-version: '0.2.5'
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }}
        POSTHOG_API_SECRET: phc_kA4Y4YGVQoQBuNPc7VspKKS2g8twHUS4ahmbad2yhRFi
        APP_VERSION: ${{ github.event.release.tag_name }}
    - name: Import macOS Signing Certificate
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_KEYCHAIN_PASSWORD" ]; then
          KEYCHAIN_PATH="$RUNNER_TEMP/codegraff-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/codegraff-signing.p12"
          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        else
          echo "CodeDB local Apple certificate secrets are not configured; skipping macOS signing."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_PASSWORD }}
        APPLE_KEYCHAIN_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_KEYCHAIN_PASSWORD }}
    - name: Download CodeDB
      if: ${{ matrix.codedb_asset != '' }}
      run: |-
        if [ -n "${{ matrix.codedb_asset }}" ]; then
          curl -fL "https://github.com/justrach/codedb/releases/latest/download/${{ matrix.codedb_asset }}" -o codedb
          chmod +x codedb
        fi
    - name: Sign macOS Binaries
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_CODESIGN_IDENTITY" ]; then
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" ${{ matrix.forge_binary_path }}
          if [ -n "${{ matrix.codegraff_binary_path }}" ]; then
            codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" ${{ matrix.codegraff_binary_path }}
          fi
        else
          echo "CodeDB local Apple signing secrets are not configured; skipping macOS signing."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_CODESIGN_IDENTITY: ${{ secrets.CODEDB_LOCAL_APPLE_CODESIGN_IDENTITY }}
    - name: Package Binaries
      run: |-
        mkdir -p dist
        cp ${{ matrix.forge_binary_path }} dist/${{ matrix.forge_binary_name }}
        cp dist/${{ matrix.forge_binary_name }} ${{ matrix.forge_binary_name }}
        if [ -n "${{ matrix.codegraff_binary_name }}" ]; then
          cp ${{ matrix.codegraff_binary_path }} dist/${{ matrix.codegraff_binary_name }}
          cp dist/${{ matrix.codegraff_binary_name }} ${{ matrix.codegraff_binary_name }}
        fi
        cp scripts/install.sh install.sh
        if [ -n "${{ matrix.codedb_asset }}" ]; then
          cp codedb dist/codedb
          tar -C dist -czf ${{ matrix.forge_binary_name }}-bundle.tar.gz ${{ matrix.forge_binary_name }} codedb
        fi
    - name: Notarize macOS Binaries
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
          mkdir -p notarize
          ditto -c -k --keepParent ${{ matrix.forge_binary_name }} "notarize/${{ matrix.forge_binary_name }}.zip"
          xcrun notarytool submit "notarize/${{ matrix.forge_binary_name }}.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          if [ -n "${{ matrix.codegraff_binary_name }}" ]; then
            ditto -c -k --keepParent ${{ matrix.codegraff_binary_name }} "notarize/${{ matrix.codegraff_binary_name }}.zip"
            xcrun notarytool submit "notarize/${{ matrix.codegraff_binary_name }}.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          fi
        else
          echo "CodeDB local Apple notarization secrets are not configured; skipping macOS notarization."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_ID: ${{ secrets.CODEDB_LOCAL_APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.CODEDB_LOCAL_APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_APP_PASSWORD }}
    - name: Upload Forge Binary to Release
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ github.event.release.id }}
        file: ${{ matrix.forge_binary_name }}
        overwrite: 'true'
    - name: Upload CodeGraff Binary to Release
      if: ${{ matrix.codegraff_binary_name != '' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ github.event.release.id }}
        file: ${{ matrix.codegraff_binary_name }}
        overwrite: 'true'
    - name: Upload Installer to Release
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ github.event.release.id }}
        file: install.sh
        overwrite: 'true'
    - name: Upload CodeDB Bundle to Release
      if: ${{ matrix.codedb_asset != '' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ github.event.release.id }}
        file: ${{ matrix.forge_binary_name }}-bundle.tar.gz
        overwrite: 'true'
  npm_release:
    needs:
    - build_release
    name: npm_release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository:
        - antinomyhq/npm-code-forge
        - antinomyhq/npm-forgecode
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        repository: ${{ matrix.repository }}
        ref: main
        token: ${{ secrets.NPM_ACCESS }}
    - name: Update NPM Package
      run: './update-package.sh ${{ github.event.release.tag_name }}'
      env:
        AUTO_PUSH: 'true'
        CI: 'true'
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  homebrew_release:
    needs:
    - build_release
    name: homebrew_release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        repository: antinomyhq/homebrew-code-forge
        ref: main
        token: ${{ secrets.HOMEBREW_ACCESS }}
    - name: Update Homebrew Formula
      run: GITHUB_TOKEN="${{ secrets.HOMEBREW_ACCESS }}" ./update-formula.sh ${{ github.event.release.tag_name }}
