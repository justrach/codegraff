name: ci
env:
  RUSTFLAGS: '-Dwarnings'
  OPENROUTER_API_KEY: ${{secrets.OPENROUTER_API_KEY}}
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    branches:
    - main
  push:
    branches:
    - main
    tags:
    - v*
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov
    - name: Generate coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
  zsh_rprompt_perf:
    name: 'Performance: zsh rprompt'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Run performance benchmark
      run: './scripts/benchmark.sh --threshold 60 zsh rprompt'
  draft_release:
    needs:
    - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      crate_release_name: ${{ steps.set_output.outputs.crate_release_name }}
      crate_release_id: ${{ steps.set_output.outputs.crate_release_id }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - id: create_release
      name: Draft Release
      uses: release-drafter/release-drafter@v7
      with:
        config-name: release-drafter.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - id: set_output
      name: Export Outputs
      run: echo "crate_release_id=${{ steps.create_release.outputs.id }}" >> $GITHUB_OUTPUT && echo "crate_release_name=${{ steps.create_release.outputs.tag_name }}" >> $GITHUB_OUTPUT
  draft_release_pr:
    if: 'github.event_name == ''pull_request'' && contains(github.event.pull_request.labels.*.name, ''ci: build all targets'')'
    name: Draft Release for PR
    runs-on: ubuntu-latest
    outputs:
      crate_release_name: ${{ steps.set_output.outputs.crate_release_name }}
      crate_release_id: ${{ steps.set_output.outputs.crate_release_id }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - id: set_output
      name: Set Release Version
      run: echo "crate_release_name=pr-build-${{ github.event.number }}" >> $GITHUB_OUTPUT && echo "crate_release_id=pr-build-${{ github.event.number }}" >> $GITHUB_OUTPUT
  build_release:
    needs:
    - draft_release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: build-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
        - os: ubuntu-latest
          target: x86_64-unknown-linux-musl
          graff_binary_name: graff-x86_64-unknown-linux-musl
          graff_binary_path: target/x86_64-unknown-linux-musl/release/graff
          codegraff_binary_name: codegraff-x86_64-unknown-linux-musl
          codegraff_binary_path: target/x86_64-unknown-linux-musl/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-x86_64
        - os: ubuntu-latest
          target: aarch64-unknown-linux-musl
          graff_binary_name: graff-aarch64-unknown-linux-musl
          graff_binary_path: target/aarch64-unknown-linux-musl/release/graff
          codegraff_binary_name: codegraff-aarch64-unknown-linux-musl
          codegraff_binary_path: target/aarch64-unknown-linux-musl/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-arm64
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          graff_binary_name: graff-x86_64-unknown-linux-gnu
          graff_binary_path: target/x86_64-unknown-linux-gnu/release/graff
          codegraff_binary_name: codegraff-x86_64-unknown-linux-gnu
          codegraff_binary_path: target/x86_64-unknown-linux-gnu/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-linux-x86_64
        - os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
          graff_binary_name: graff-aarch64-unknown-linux-gnu
          graff_binary_path: target/aarch64-unknown-linux-gnu/release/graff
          codegraff_binary_name: codegraff-aarch64-unknown-linux-gnu
          codegraff_binary_path: target/aarch64-unknown-linux-gnu/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-arm64
        - os: macos-latest
          target: x86_64-apple-darwin
          graff_binary_name: graff-x86_64-apple-darwin
          graff_binary_path: target/x86_64-apple-darwin/release/graff
          codegraff_binary_name: codegraff-x86_64-apple-darwin
          codegraff_binary_path: target/x86_64-apple-darwin/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-darwin-x86_64
        - os: macos-latest
          target: aarch64-apple-darwin
          graff_binary_name: graff-aarch64-apple-darwin
          graff_binary_path: target/aarch64-apple-darwin/release/graff
          codegraff_binary_name: codegraff-aarch64-apple-darwin
          codegraff_binary_path: target/aarch64-apple-darwin/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-darwin-arm64
        - os: windows-latest
          target: x86_64-pc-windows-msvc
          graff_binary_name: graff-x86_64-pc-windows-msvc.exe
          graff_binary_path: target/x86_64-pc-windows-msvc/release/graff.exe
          codegraff_binary_name: codegraff-x86_64-pc-windows-msvc.exe
          codegraff_binary_path: target/x86_64-pc-windows-msvc/release/codegraff.exe
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: ''
        - os: windows-latest
          target: aarch64-pc-windows-msvc
          graff_binary_name: graff-aarch64-pc-windows-msvc.exe
          graff_binary_path: target/aarch64-pc-windows-msvc/release/graff.exe
          codegraff_binary_name: codegraff-aarch64-pc-windows-msvc.exe
          codegraff_binary_path: target/aarch64-pc-windows-msvc/release/codegraff.exe
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: ''
        - os: ubuntu-latest
          target: aarch64-linux-android
          graff_binary_name: graff-aarch64-linux-android
          graff_binary_path: target/aarch64-linux-android/release/graff
          codegraff_binary_name: ''
          codegraff_binary_path: ''
          build_bins: '--bin graff'
          cross: 'true'
          codedb_asset: ''
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      if: ${{ matrix.cross == 'false' }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cross Toolchain
      if: ${{ matrix.cross == 'false' }}
      uses: taiki-e/setup-cross-toolchain-action@v1
      with:
        target: ${{ matrix.target }}
    - name: Add Rust target
      if: ${{ matrix.cross == 'false' }}
      run: rustup target add ${{ matrix.target }}
    - name: Set Rust Flags
      if: '!(contains(matrix.target, ''-unknown-linux-'') || contains(matrix.target, ''-android''))'
      run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
    - name: Build Binaries
      uses: ClementTsang/cargo-action@v0.0.7
      with:
        command: build --release
        args: ${{ matrix.build_bins }} --target ${{ matrix.target }}
        use-cross: ${{ matrix.cross }}
        cross-version: '0.2.5'
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }}
        POSTHOG_API_SECRET: phc_kA4Y4YGVQoQBuNPc7VspKKS2g8twHUS4ahmbad2yhRFi
        APP_VERSION: ${{ needs.draft_release.outputs.crate_release_name }}
    - name: Import macOS Signing Certificate
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_KEYCHAIN_PASSWORD" ]; then
          KEYCHAIN_PATH="$RUNNER_TEMP/codegraff-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/codegraff-signing.p12"
          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        else
          echo "CodeDB local Apple certificate secrets are not configured; skipping macOS signing."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_PASSWORD }}
        APPLE_KEYCHAIN_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_KEYCHAIN_PASSWORD }}
    - name: Download CodeDB
      if: ${{ matrix.codedb_asset != '' }}
      run: |-
        if [ -n "${{ matrix.codedb_asset }}" ]; then
          curl -fL "https://github.com/justrach/codedb/releases/latest/download/${{ matrix.codedb_asset }}" -o codedb
          chmod +x codedb
        fi
    - name: Sign macOS Binaries
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_CODESIGN_IDENTITY" ]; then
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" ${{ matrix.graff_binary_path }}
          if [ -n "${{ matrix.codegraff_binary_path }}" ]; then
            codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" ${{ matrix.codegraff_binary_path }}
          fi
        else
          echo "CodeDB local Apple signing secrets are not configured; skipping macOS signing."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_CODESIGN_IDENTITY: ${{ secrets.CODEDB_LOCAL_APPLE_CODESIGN_IDENTITY }}
    - name: Package Binaries
      run: |-
        mkdir -p dist
        cp ${{ matrix.graff_binary_path }} dist/${{ matrix.graff_binary_name }}
        cp dist/${{ matrix.graff_binary_name }} ${{ matrix.graff_binary_name }}
        if [ -n "${{ matrix.codegraff_binary_name }}" ]; then
          cp ${{ matrix.codegraff_binary_path }} dist/${{ matrix.codegraff_binary_name }}
          cp dist/${{ matrix.codegraff_binary_name }} ${{ matrix.codegraff_binary_name }}
        fi
        cp scripts/install.sh install.sh
        if [ -n "${{ matrix.codedb_asset }}" ]; then
          cp codedb dist/codedb
          tar -C dist -czf ${{ matrix.graff_binary_name }}-bundle.tar.gz ${{ matrix.graff_binary_name }} codedb
        fi
    - name: Notarize macOS Binaries
      if: ${{ runner.os == 'macOS' }}
      run: |-
        if [ -n "$APPLE_CERTIFICATE_P12" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_APP_PASSWORD" ]; then
          mkdir -p notarize
          ditto -c -k --keepParent ${{ matrix.graff_binary_name }} "notarize/${{ matrix.graff_binary_name }}.zip"
          xcrun notarytool submit "notarize/${{ matrix.graff_binary_name }}.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          if [ -n "${{ matrix.codegraff_binary_name }}" ]; then
            ditto -c -k --keepParent ${{ matrix.codegraff_binary_name }} "notarize/${{ matrix.codegraff_binary_name }}.zip"
            xcrun notarytool submit "notarize/${{ matrix.codegraff_binary_name }}.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          fi
        else
          echo "CodeDB local Apple notarization secrets are not configured; skipping macOS notarization."
        fi
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.CODEDB_LOCAL_APPLE_CERTIFICATE_P12 }}
        APPLE_ID: ${{ secrets.CODEDB_LOCAL_APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.CODEDB_LOCAL_APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.CODEDB_LOCAL_APPLE_APP_PASSWORD }}
    - name: Upload Graff Binary to Release
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release.outputs.crate_release_id }}
        file: ${{ matrix.graff_binary_name }}
        overwrite: 'true'
    - name: Upload CodeGraff Binary to Release
      if: ${{ matrix.codegraff_binary_name != '' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release.outputs.crate_release_id }}
        file: ${{ matrix.codegraff_binary_name }}
        overwrite: 'true'
    - name: Upload Installer to Release
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release.outputs.crate_release_id }}
        file: install.sh
        overwrite: 'true'
    - name: Upload CodeDB Bundle to Release
      if: ${{ matrix.codedb_asset != '' }}
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release.outputs.crate_release_id }}
        file: ${{ matrix.graff_binary_name }}-bundle.tar.gz
        overwrite: 'true'
  build_release_pr:
    needs:
    - draft_release_pr
    if: 'github.event_name == ''pull_request'' && contains(github.event.pull_request.labels.*.name, ''ci: build all targets'')'
    name: build-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
        - os: ubuntu-latest
          target: x86_64-unknown-linux-musl
          graff_binary_name: graff-x86_64-unknown-linux-musl
          graff_binary_path: target/x86_64-unknown-linux-musl/release/graff
          codegraff_binary_name: codegraff-x86_64-unknown-linux-musl
          codegraff_binary_path: target/x86_64-unknown-linux-musl/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-x86_64
        - os: ubuntu-latest
          target: aarch64-unknown-linux-musl
          graff_binary_name: graff-aarch64-unknown-linux-musl
          graff_binary_path: target/aarch64-unknown-linux-musl/release/graff
          codegraff_binary_name: codegraff-aarch64-unknown-linux-musl
          codegraff_binary_path: target/aarch64-unknown-linux-musl/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-arm64
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          graff_binary_name: graff-x86_64-unknown-linux-gnu
          graff_binary_path: target/x86_64-unknown-linux-gnu/release/graff
          codegraff_binary_name: codegraff-x86_64-unknown-linux-gnu
          codegraff_binary_path: target/x86_64-unknown-linux-gnu/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-linux-x86_64
        - os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
          graff_binary_name: graff-aarch64-unknown-linux-gnu
          graff_binary_path: target/aarch64-unknown-linux-gnu/release/graff
          codegraff_binary_name: codegraff-aarch64-unknown-linux-gnu
          codegraff_binary_path: target/aarch64-unknown-linux-gnu/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'true'
          codedb_asset: codedb-linux-arm64
        - os: macos-latest
          target: x86_64-apple-darwin
          graff_binary_name: graff-x86_64-apple-darwin
          graff_binary_path: target/x86_64-apple-darwin/release/graff
          codegraff_binary_name: codegraff-x86_64-apple-darwin
          codegraff_binary_path: target/x86_64-apple-darwin/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-darwin-x86_64
        - os: macos-latest
          target: aarch64-apple-darwin
          graff_binary_name: graff-aarch64-apple-darwin
          graff_binary_path: target/aarch64-apple-darwin/release/graff
          codegraff_binary_name: codegraff-aarch64-apple-darwin
          codegraff_binary_path: target/aarch64-apple-darwin/release/codegraff
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: codedb-darwin-arm64
        - os: windows-latest
          target: x86_64-pc-windows-msvc
          graff_binary_name: graff-x86_64-pc-windows-msvc.exe
          graff_binary_path: target/x86_64-pc-windows-msvc/release/graff.exe
          codegraff_binary_name: codegraff-x86_64-pc-windows-msvc.exe
          codegraff_binary_path: target/x86_64-pc-windows-msvc/release/codegraff.exe
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: ''
        - os: windows-latest
          target: aarch64-pc-windows-msvc
          graff_binary_name: graff-aarch64-pc-windows-msvc.exe
          graff_binary_path: target/aarch64-pc-windows-msvc/release/graff.exe
          codegraff_binary_name: codegraff-aarch64-pc-windows-msvc.exe
          codegraff_binary_path: target/aarch64-pc-windows-msvc/release/codegraff.exe
          build_bins: '--bin graff --bin codegraff'
          cross: 'false'
          codedb_asset: ''
        - os: ubuntu-latest
          target: aarch64-linux-android
          graff_binary_name: graff-aarch64-linux-android
          graff_binary_path: target/aarch64-linux-android/release/graff
          codegraff_binary_name: ''
          codegraff_binary_path: ''
          build_bins: '--bin graff'
          cross: 'true'
          codedb_asset: ''
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      if: ${{ matrix.cross == 'false' }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cross Toolchain
      if: ${{ matrix.cross == 'false' }}
      uses: taiki-e/setup-cross-toolchain-action@v1
      with:
        target: ${{ matrix.target }}
    - name: Add Rust target
      if: ${{ matrix.cross == 'false' }}
      run: rustup target add ${{ matrix.target }}
    - name: Set Rust Flags
      if: '!(contains(matrix.target, ''-unknown-linux-'') || contains(matrix.target, ''-android''))'
      run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
    - name: Build Binaries
      uses: ClementTsang/cargo-action@v0.0.7
      with:
        command: build --release
        args: ${{ matrix.build_bins }} --target ${{ matrix.target }}
        use-cross: ${{ matrix.cross }}
        cross-version: '0.2.5'
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }}
        POSTHOG_API_SECRET: phc_kA4Y4YGVQoQBuNPc7VspKKS2g8twHUS4ahmbad2yhRFi
        APP_VERSION: ${{ needs.draft_release_pr.outputs.crate_release_name }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
